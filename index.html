<!DOCTYPE html>
<html>
<head>
  <title>Discord UI Clone</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial;
      color: white;
    }

    /* Servers bar */
    .servers {
      width: 70px;
      background: #202225;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
    }

    .server-icon {
      width: 50px;
      height: 50px;
      background: #5865f2;
      border-radius: 50%;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Channels */
    .channels {
      width: 220px;
      background: #2f3136;
      padding: 10px;
    }

    .channel {
      padding: 8px;
      cursor: pointer;
    }

    .channel:hover {
      background: #40444b;
    }

    /* Chat area */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #36393f;
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #40444b;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #303338;
      color: white;
    }

    button {
      padding: 10px;
      background: #5865f2;
      border: none;
      color: white;
    }
  </style>
</head>
<body>

<div class="servers">
  <div class="server-icon">S</div>
</div>

<div class="channels">
  <h3>Channels</h3>
  <div class="channel"># general</div>
  <div class="channel"># gaming</div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="Message #general" />
    <button>Send</button>
  </div>
</div>

</body>
</html>
